<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garments AI Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f9fafb;
      color: #111827;
    }

    .sidebar {
      background-color: #f3f4f6;
      border-right: 1px solid #e5e7eb;
    }

    .chat-container {
      background-color: #ffffff;
    }

    .user-bubble {
      background-color: #f3f4f6;
      border-radius: 12px;
      padding: 12px 20px;
    }

    .ai-card {
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      padding: 20px;
    }

    .table-custom {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .table-custom th {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      color: #4b5563;
      font-weight: 600;
    }

    .table-custom td {
      padding: 12px;
      border-bottom: 1px solid #f3f4f6;
      color: #111827;
    }

    .table-custom tr:last-child td {
      border-bottom: none;
    }

    .input-area {
      background-color: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .send-btn {
      background-color: #6366f1;
      color: white;
      transition: all 0.2s;
    }

    .send-btn:hover {
      background-color: #4f46e5;
      transform: scale(1.05);
    }

    .recent-item {
      transition: all 0.2s;
    }

    .recent-item:hover {
      background-color: #e5e7eb;
    }

    .indicator-dot {
      width: 10px;
      height: 10px;
      border: 1px solid #9ca3af;
      border-radius: 50%;
      display: inline-block;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    #messages {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body class="h-screen overflow-hidden flex">

  <!-- Sidebar -->
  <aside class="sidebar w-72 flex flex-col p-6 overflow-y-auto scrollbar-hide">
    <!-- Logo -->
    <div class="flex items-center gap-3 mb-10">
      <img src="/logo.png" alt="Logo" class="w-10 h-10 object-contain">
      <div>
        <h1 class="text-xl font-bold text-gray-900 tracking-tight">Garments</h1>
        <p class="text-[10px] text-gray-500 uppercase tracking-widest font-medium">Ai-Powered Database</p>
      </div>
    </div>

    <!-- Recent Searches -->
    <div class="mb-10">
      <h2 class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
        <i data-lucide="clock" class="w-3 h-3"></i> RECENT SEARCHES
      </h2>
      <div id="recent-list" class="space-y-4">
        <!-- Sample recent search item -->
        <div class="recent-item cursor-pointer">
          <div class="font-semibold text-sm text-gray-800">categories</div>
          <div class="flex items-center gap-2 mt-1">
            <div class="indicator-dot"></div>
            <span class="text-[10px] text-gray-500">10/02/2026, 14:31:58</span>
          </div>
        </div>
      </div>
    </div>

  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col relative min-w-0">
    <!-- Header -->
    <header class="py-4 px-8 border-b border-gray-200 flex items-center justify-between bg-white z-10">
      <div class="flex items-center gap-3">
        <h2 class="text-xl font-bold text-gray-900">Chat</h2>
        <div
          class="flex items-center gap-1.5 px-2 py-0.5 bg-green-50 text-green-600 rounded-full text-[10px] font-bold border border-green-100">
          <div class="w-1.5 h-1.5 bg-green-500 rounded-full"></div>
          Online
        </div>
      </div>
      <div class="flex items-center gap-4 text-gray-500">
        <i data-lucide="help-circle" class="w-5 h-5 cursor-pointer hover:text-gray-700 transition-colors"></i>
        <i data-lucide="settings" class="w-5 h-5 cursor-pointer hover:text-gray-700 transition-colors"></i>
        <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center">
          <i data-lucide="user" class="w-4 h-4 text-gray-600"></i>
        </div>
      </div>
    </header>

    <!-- Messages Area -->
    <div id="messages" class="flex-1 overflow-y-auto p-8 space-y-10 scrollbar-hide">
      <!-- Messages will be injected here -->

      <!-- Welcome placeholder -->
      <div id="welcome-hint" class="flex flex-col items-center justify-center h-full opacity-50">
        <i data-lucide="message-square" class="w-16 h-16 mb-4 text-gray-300"></i>
        <p class="text-gray-400 text-sm">Ask me anything about your database...</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="p-8 pt-0">
      <div class="max-w-4xl mx-auto relative">
        <div class="input-area flex items-center p-2 pr-3">
          <textarea id="user-input" rows="1" placeholder="Ask me anything about your database..."
            class="flex-1 px-4 py-2 bg-transparent focus:outline-none text-sm resize-none scrollbar-hide"
            style="max-height: 150px;"></textarea>
          <button id="send-btn" class="send-btn w-9 h-9 rounded-xl flex items-center justify-center shrink-0 shadow-lg">
            <i data-lucide="send" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    const messagesContainer = document.getElementById('messages');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const welcomeHint = document.getElementById('welcome-hint');
    const recentList = document.getElementById('recent-list');

    const COLUMN_NAMES = {
      student_id: 'Student ID',
      student_name: 'Name',
      class: 'Class',
      section: 'Section',
      roll_no: 'Roll No',
      gender: 'Gender',
      total_days: 'Total Days',
      present_days: 'Present Days',
      absent_days: 'Absent Days',
      total_fee: 'Total Fee',
      paid_fee: 'Paid Fee',
      due_fee: 'Due Fee',
      leave_type: 'Leave Type',
      leave_days: 'Leave Days',
      exam_id: 'Exam ID',
      exam_name: 'Exam Name',
      total_marks: 'Total Marks',
      obtained_marks: 'Obtained Marks',
      class_rank: 'Class Rank',
      teacher_id: 'Teacher ID',
      teacher_name: 'Teacher Name',
      subject_id: 'Subject ID',
      subject_name: 'Subject',
      attendance_id: 'Attendance ID',
      fee_id: 'Fee ID',
      mark_id: 'Mark ID',
      rank_id: 'Rank ID',
      leave_id: 'Leave ID',
      summary_id: 'Summary ID',
      total_students: 'Total Students',
      qualityStatus: 'Quality Status',
      complaintText: 'Complaint Details'
    };

    function formatHeader(key) {
      return COLUMN_NAMES[key] || key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    }

    // Auto-resize textarea
    userInput.addEventListener('input', () => {
      userInput.style.height = 'auto';
      userInput.style.height = (userInput.scrollHeight) + 'px';
    });

    // Function to append a message
    function appendMessage(role, content, data = null) {
      if (welcomeHint) welcomeHint.classList.add('hidden');

      const messageDiv = document.createElement('div');
      messageDiv.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} gap-4 max-w-5xl mx-auto w-full`;

      if (role === 'user') {
        messageDiv.innerHTML = `
                    <div class="max-w-[80%] flex items-start gap-3">
                        <div class="user-bubble text-sm text-gray-800 shadow-sm">
                            ${content}
                        </div>
                        <div class="w-9 h-9 rounded-xl bg-gray-100 border border-gray-200 flex items-center justify-center shrink-0">
                            <i data-lucide="user" class="w-4 h-4 text-gray-600"></i>
                        </div>
                    </div>
                `;
      } else {
        let innerHtml = `
                    <div class="max-w-[90%] flex items-start gap-4">
                        <div class="w-9 h-9 rounded-xl bg-[#6366f1]/10 flex items-center justify-center shrink-0">
                            <i data-lucide="briefcase" class="w-4 h-4 text-[#6366f1]"></i>
                        </div>
                        <div class="w-full">
                            <div class="ai-card">
                        `;
        // Improved table detection: looks for the standard markdown table separator
        const isMarkdownTable = content.includes('|') && /\|?\s*---\s*\|/.test(content);

        if (data && data.length > 0) {
          const technicalColumns = ['__v', 'user', 'updatedAt', 'createdAt', '_id', 'id'];
          const keys = Object.keys(data[0]).filter(k => !technicalColumns.includes(k));

          // If it's a markdown table or if there are multiple rows, show the table
          // For single rows, the 'content' (formatted text) is usually enough
          if (data.length > 1) {
            // Extraction of lead-in text if present
            const isMarkdownTable = content.includes('|') && /\|?\s*---\s*\|/.test(content);
            if (isMarkdownTable) {
              const possibleText = content.split('|')[0].trim();
              if (possibleText && possibleText.length > 5 && !possibleText.includes('---')) {
                innerHtml += `<p class="text-sm text-gray-700 leading-relaxed mb-4">${possibleText}</p>`;
              }
            } else {
              innerHtml += `<p class="text-sm text-gray-700 leading-relaxed mb-4">${content.replace(/\n/g, '<br>')}</p>`;
            }

            innerHtml += `<div class="overflow-x-auto border border-gray-100 rounded-lg">
                          <table class="table-custom">
                              <thead>
                                  <tr>
                                      ${keys.map(key => `<th>${formatHeader(key)}</th>`).join('')}
                                  </tr>
                              </thead>
                              <tbody>
                                  ${data.map(row => `
                                      <tr>
                                          ${keys.map(key => {
              let val = row[key];
              if (val === null || val === undefined) return '<td>N/A</td>';
              if (Array.isArray(val)) val = val.join(', ');
              // Format dates
              if (key.toLowerCase().includes('date') || key.toLowerCase().includes('at')) {
                try {
                  const date = new Date(val);
                  if (!isNaN(date)) val = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } catch (e) { }
              }
              return `<td>${val}</td>`;
            }).join('')}
                                      </tr>
                                  `).join('')}
                              </tbody>
                          </table>
                      </div>`;
          } else {
            // Single row: Just show the formatted text from backend
            innerHtml += `<p class="text-sm text-gray-700 leading-relaxed">${content.replace(/\n/g, '<br>')}</p>`;
          }
        } else {
          // Just text
          innerHtml += `<p class="text-sm text-gray-700 leading-relaxed">${content.replace(/\n/g, '<br>')}</p>`;
        }

        innerHtml += `</div></div></div>`;
        messageDiv.innerHTML = innerHtml;
      }
      messagesContainer.appendChild(messageDiv);
      lucide.createIcons();
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Send function
    async function handleSend() {
      const message = userInput.value.trim();
      if (!message) return;

      appendMessage('user', message);
      userInput.value = '';
      userInput.style.height = 'auto';

      // Show loading placeholder
      const loadingId = 'loading-' + Date.now();
      const loadingDiv = document.createElement('div');
      loadingDiv.id = loadingId;
      loadingDiv.className = 'flex justify-start gap-4 max-w-5xl mx-auto w-full';
      loadingDiv.innerHTML = `
                <div class="w-9 h-9 rounded-xl bg-indigo-50 flex items-center justify-center shrink-0">
                    <i data-lucide="briefcase" class="w-4 h-4 text-indigo-400"></i>
                </div>
                <div class="ai-card flex-1 bg-white border-gray-100 shadow-sm animate-pulse">
                    <div class="h-3 bg-gray-100 rounded w-3/4 mb-3"></div>
                    <div class="h-3 bg-gray-100 rounded w-1/2"></div>
                </div>
            `;
      messagesContainer.appendChild(loadingDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await response.json();

        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();

        appendMessage('bot', data.formatted || "Completed your request.", data.data);

        // Refresh history
        loadHistory();
      } catch (error) {
        const loader = document.getElementById(loadingId);
        if (loader) loader.remove();
        appendMessage('bot', "Sorry, I encountered an error connecting to the AI.");
      }
    }


    // History loading
    async function loadHistory() {
      try {
        const res = await fetch('/api/chat/history');
        const items = await res.json();
        recentList.innerHTML = items.map(item => `
                    <div class="recent-item p-2 -mx-2 rounded-lg cursor-pointer" onclick="setInput('${item.question}')">
                        <div class="font-semibold text-sm text-gray-800 line-clamp-1">${item.question}</div>
                        <div class="flex items-center gap-2 mt-1">
                            <div class="indicator-dot"></div>
                            <span class="text-[9px] text-gray-500">${new Date(item.created_at).toLocaleString()}</span>
                        </div>
                    </div>
                `).join('');
      } catch (e) { }
    }

    function setInput(text) {
      userInput.value = text;
      userInput.style.height = 'auto';
      userInput.style.height = userInput.scrollHeight + 'px';
      userInput.focus();
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    // Initial load
    loadHistory();
  </script>
</body>

</html>
