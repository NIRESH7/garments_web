<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI SQL Chatbot</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --panel: #1e293b;
        --accent: #38bdf8;
        --text: #f8fafc;
        --muted: #94a3b8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      #app {
        width: min(960px, 100%);
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
      }
      .panel {
        background: var(--panel);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }
      .chat-window {
        display: flex;
        flex-direction: column;
        height: 600px;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        margin-bottom: 16px;
        padding-right: 8px;
      }
      .message {
        margin-bottom: 18px;
      }
      .message.user .bubble {
        background: var(--accent);
        color: #0f172a;
        margin-left: auto;
      }
      .message.bot .bubble {
        background: rgba(148, 163, 184, 0.15);
        border: 1px solid rgba(148, 163, 184, 0.2);
      }
      .bubble {
        padding: 14px 18px;
        border-radius: 18px;
        max-width: 80%;
        white-space: pre-line;
      }
      form {
        display: flex;
        gap: 12px;
      }
      input {
        flex: 1;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.6);
        color: var(--text);
        font-size: 1rem;
      }
      button {
        padding: 14px 20px;
        border: none;
        border-radius: 14px;
        background: var(--accent);
        color: #0f172a;
        font-weight: 600;
        cursor: pointer;
      }
      .history {
        height: 600px;
        display: flex;
        flex-direction: column;
      }
      .history h2 {
        margin-top: 0;
      }
      .history-list {
        flex: 1;
        overflow-y: auto;
        margin-top: 12px;
      }
      .history-item {
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        margin-bottom: 12px;
      }
      .history-item code {
        display: block;
        margin-top: 8px;
        font-size: 0.85rem;
        color: var(--muted);
        white-space: pre-wrap;
      }
      .loading {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .loading span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        animation: bounce 0.9s infinite ease-in-out;
      }
      .loading span:nth-child(2) {
        animation-delay: 0.15s;
      }
      .loading span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.3;
        }
        40% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }
      @media (max-width: 900px) {
        #app {
          grid-template-columns: 1fr;
        }
        .chat-window,
        .history {
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <section class="panel chat-window">
        <div class="messages" id="messages"></div>
        <form id="chat-form">
          <input id="user-input" type="text" placeholder="Ask about orders, customers, or products..." autocomplete="off" required />
          <button type="submit">Ask</button>
        </form>
      </section>
      <aside class="panel history">
        <div>
          <h2>Recent Searches</h2>
          <p class="muted">Examples: "Show today sales", "Low stock products"</p>
        </div>
        <div class="history-list" id="history"></div>
      </aside>
    </div>

    <template id="message-template">
      <div class="message">
        <div class="bubble"></div>
      </div>
    </template>

    <script>
      const messagesEl = document.getElementById('messages');
      const historyEl = document.getElementById('history');
      const form = document.getElementById('chat-form');
      const input = document.getElementById('user-input');

      function appendMessage(text, role = 'bot') {
        const tpl = document.getElementById('message-template').content.cloneNode(true);
        const messageEl = tpl.querySelector('.message');
        const bubble = tpl.querySelector('.bubble');
        messageEl.classList.add(role);
        bubble.textContent = text;
        messagesEl.appendChild(messageEl);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      function showLoading() {
        const bubble = appendMessage('', 'bot');
        bubble.innerHTML = '<div class="loading"><span></span><span></span><span></span>Thinking...</div>';
        return bubble.parentElement;
      }

      async function fetchHistory() {
        try {
          const res = await fetch('/api/chat/history');
          const items = await res.json();
          historyEl.innerHTML = items
            .map(
              item => `
            <div class="history-item">
              <strong>${item.question}</strong>
              <code>${item.generated_sql}</code>
              <small>${new Date(item.created_at).toLocaleString()}</small>
            </div>`
            )
            .join('');
        } catch (error) {
          console.error('History error', error);
        }
      }

      form.addEventListener('submit', async event => {
        event.preventDefault();
        const question = input.value.trim();
        if (!question) return;
        appendMessage(question, 'user');
        input.value = '';
        const loader = showLoading();

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: question })
          });

          const data = await response.json();
          loader.remove();

          if (!response.ok) {
            appendMessage(`Error: ${data.error || 'Unknown error'}`);
            return;
          }

          const details = `SQL (${data.strategy}):\n${data.sql}\n\n${data.formatted}`;
          appendMessage(details);
          fetchHistory();
        } catch (error) {
          loader.remove();
          appendMessage(`Request failed: ${error.message}`);
        }
      });

      fetchHistory();
    </script>
  </body>
</html>
