<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI SQL Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'chat-bg': '#343541',
              'chat-sidebar': '#202123',
              'chat-input': '#40414f',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      * {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes pulse-dot {
        0%, 80%, 100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }
      .animate-pulse-dot {
        animation: pulse-dot 1.4s infinite ease-in-out;
      }
      .animate-pulse-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .animate-pulse-dot:nth-child(3) {
        animation-delay: 0.4s;
      }
      code {
        font-family: 'Courier New', monospace;
      }
    </style>
  </head>
  <body class="bg-gray-900 text-gray-100 h-screen overflow-hidden">
    <div class="flex h-full">
      <!-- Sidebar -->
      <aside class="w-64 bg-chat-sidebar border-r border-gray-700 flex flex-col hidden md:flex">
        <div class="p-4 border-b border-gray-700">
          <h1 class="text-xl font-semibold text-white mb-2">AI SQL Chatbot</h1>
          <p class="text-xs text-gray-400">Query your database with natural language</p>
        </div>
        
        <div class="flex-1 overflow-y-auto scrollbar-hide p-4">
          <div class="mb-4">
            <h2 class="text-sm font-semibold text-gray-300 mb-2 uppercase tracking-wide">Recent Searches</h2>
            <div id="history" class="space-y-2">
              <!-- History items will be inserted here -->
            </div>
          </div>
        </div>

        <div class="p-4 border-t border-gray-700">
          <div class="text-xs text-gray-400 space-y-1">
            <p class="font-medium text-gray-300 mb-2">Try asking:</p>
            <p>• "Show today sales"</p>
            <p>• "Low stock products"</p>
            <p>• "Total orders"</p>
          </div>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="flex-1 flex flex-col bg-chat-bg">
        <!-- Header -->
        <header class="border-b border-gray-700 px-4 py-3 bg-chat-bg">
          <div class="flex items-center justify-between">
            <h2 class="text-lg font-semibold text-white">Chat</h2>
            <button id="sidebar-toggle" class="md:hidden text-gray-400 hover:text-white">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
              </svg>
            </button>
          </div>
        </header>

        <!-- Messages Container -->
        <div id="messages" class="flex-1 overflow-y-auto scrollbar-hide px-4 py-6 space-y-6">
          <!-- Welcome Message -->
          <div class="max-w-3xl mx-auto text-center py-12">
            <div class="mb-4">
              <svg class="w-16 h-16 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
              </svg>
            </div>
            <h3 class="text-2xl font-semibold text-white mb-2">How can I help you today?</h3>
            <p class="text-gray-400">Ask questions about your database in natural language</p>
          </div>
        </div>

        <!-- Input Area -->
        <div class="border-t border-gray-700 bg-chat-bg">
          <form id="chat-form" class="max-w-3xl mx-auto p-4">
            <div class="relative flex items-end gap-2">
              <div class="flex-1 relative">
                <textarea
                  id="user-input"
                  rows="1"
                  placeholder="Message AI SQL Chatbot..."
                  class="w-full px-4 py-3 pr-12 bg-chat-input text-white rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none max-h-32 overflow-y-auto scrollbar-hide"
                  autocomplete="off"
                  required
                ></textarea>
              </div>
              <button
                type="submit"
                class="px-4 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center min-w-[44px]"
                id="submit-btn"
              >
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
              </button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <template id="message-template">
      <div class="message-group flex gap-4 max-w-3xl mx-auto">
        <div class="avatar flex-shrink-0 w-8 h-8 rounded-full flex items-center justify-center font-semibold text-sm"></div>
        <div class="message-content flex-1">
          <div class="bubble rounded-lg px-4 py-3 whitespace-pre-wrap"></div>
        </div>
      </div>
    </template>

    <script>
      const messagesEl = document.getElementById('messages');
      const historyEl = document.getElementById('history');
      const form = document.getElementById('chat-form');
      const input = document.getElementById('user-input');
      const submitBtn = document.getElementById('submit-btn');
      let welcomeMessage = messagesEl.querySelector('.max-w-3xl');

      // Auto-resize textarea
      input.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 128) + 'px';
      });

      // Handle Enter key (Shift+Enter for new line)
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          form.dispatchEvent(new Event('submit'));
        }
      });

      function appendMessage(text, role = 'bot') {
        // Remove welcome message
        if (welcomeMessage && welcomeMessage.parentNode) {
          welcomeMessage.remove();
          welcomeMessage = null;
        }

        const tpl = document.getElementById('message-template').content.cloneNode(true);
        const messageGroup = tpl.querySelector('.message-group');
        const avatar = tpl.querySelector('.avatar');
        const bubble = tpl.querySelector('.bubble');

        if (role === 'user') {
          messageGroup.classList.add('flex-row-reverse');
          avatar.classList.add('bg-blue-600', 'text-white');
          avatar.textContent = 'U';
          bubble.classList.add('bg-blue-600', 'text-white', 'ml-auto', 'max-w-[85%]');
          bubble.textContent = text;
        } else {
          avatar.classList.add('bg-gray-700', 'text-gray-300');
          avatar.textContent = 'AI';
          bubble.classList.add('bg-gray-800', 'text-gray-100', 'border', 'border-gray-700');
          
          // Format the response with better styling
          const lines = text.split('\n');
          let formatted = '';
          let inCodeBlock = false;
          
          lines.forEach(line => {
            if (line.trim().startsWith('SQL')) {
              formatted += `<div class="font-semibold text-blue-400 mb-2">${line}</div>`;
            } else if (line.trim().startsWith('SELECT') || line.trim().startsWith('WITH')) {
              formatted += `<div class="bg-gray-900 rounded p-3 my-2 border border-gray-700"><code class="text-green-400 text-sm">${line}</code></div>`;
            } else if (line.trim() === '') {
              formatted += '<br>';
            } else {
              formatted += `<div class="text-gray-300">${line}</div>`;
            }
          });
          
          bubble.innerHTML = formatted || text;
        }

        messagesEl.appendChild(messageGroup);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return bubble;
      }

      function showLoading() {
        if (welcomeMessage && welcomeMessage.parentNode) {
          welcomeMessage.remove();
          welcomeMessage = null;
        }

        const tpl = document.getElementById('message-template').content.cloneNode(true);
        const messageGroup = tpl.querySelector('.message-group');
        const avatar = tpl.querySelector('.avatar');
        const bubble = tpl.querySelector('.bubble');

        avatar.classList.add('bg-gray-700', 'text-gray-300');
        avatar.textContent = 'AI';
        bubble.classList.add('bg-gray-800', 'text-gray-100', 'border', 'border-gray-700');
        bubble.innerHTML = `
          <div class="flex items-center gap-2 text-gray-400">
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-pulse-dot"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-pulse-dot"></span>
            <span class="w-2 h-2 bg-gray-400 rounded-full animate-pulse-dot"></span>
            <span class="ml-2">Thinking...</span>
          </div>
        `;

        messagesEl.appendChild(messageGroup);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return messageGroup;
      }

      async function fetchHistory() {
        try {
          const res = await fetch('/api/chat/history');
          const items = await res.json();
          
          if (items.length === 0) {
            historyEl.innerHTML = '<p class="text-xs text-gray-500 text-center py-4">No search history yet</p>';
            return;
          }

          historyEl.innerHTML = items
            .map(
              item => `
            <div class="group p-3 rounded-lg hover:bg-gray-800 transition-colors cursor-pointer border border-gray-700">
              <div class="text-sm text-white font-medium mb-1 line-clamp-2">${item.question}</div>
              <code class="text-xs text-gray-400 block mt-2 line-clamp-2 font-mono">${item.generated_sql}</code>
              <div class="text-xs text-gray-500 mt-2">${new Date(item.created_at).toLocaleString()}</div>
            </div>`
            )
            .join('');
        } catch (error) {
          console.error('History error', error);
          historyEl.innerHTML = '<p class="text-xs text-red-400 text-center py-4">Failed to load history</p>';
        }
      }

      form.addEventListener('submit', async event => {
        event.preventDefault();
        const question = input.value.trim();
        if (!question) return;

        // Disable input during request
        input.disabled = true;
        submitBtn.disabled = true;

        appendMessage(question, 'user');
        input.value = '';
        input.style.height = 'auto';
        const loader = showLoading();

        try {
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: question })
          });

          const data = await response.json();
          loader.remove();

          if (!response.ok) {
            appendMessage(`Error: ${data.error || 'Unknown error'}`, 'bot');
            return;
          }

          const details = `SQL (${data.strategy}):\n${data.sql}\n\n${data.formatted}`;
          appendMessage(details, 'bot');
          fetchHistory();
        } catch (error) {
          loader.remove();
          appendMessage(`Request failed: ${error.message}`, 'bot');
        } finally {
          input.disabled = false;
          submitBtn.disabled = false;
          input.focus();
        }
      });

      // Mobile sidebar toggle
      document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
        document.querySelector('aside').classList.toggle('hidden');
      });

      // Initialize
      fetchHistory();
      input.focus();
    </script>
  </body>
</html>
